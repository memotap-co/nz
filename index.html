  .view{ display:none; position:relative; }
  .view.active{ display:block; animation:viewIn .32s cubic-bezier(.2,.7,.3,1); }
  .fade-in-content{ opacity:0; animation:fadeInDelayed .5s ease forwards; animation-delay:.35s; }
  @keyframes fadeInDelayed{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  @keyframes viewIn{ from{ opacity:0; transform:translateX(18px); } to{ opacity:1; transform:translateX(0); } }
  #view-list.active{ animation:viewInBack .32s cubic-bezier(.2,.7,.3,1); }
  @keyframes viewInBack{ from{ opacity:0; transform:translateX(-18px); } to{ opacity:1; transform:translateX(0); } }

  /* ---------- HEADER ---------- */
  .brand-bar{ display:flex; align-items:center; justify-content:space-between; padding:14px 20px 10px; border-bottom:1px solid var(--line); }
  .weather-widget{ display:flex; align-items:center; gap:6px; background:var(--navy-soft); border-radius:999px; padding:8px 13px; cursor:pointer; flex-shrink:0; }
  .weather-icon{ font-size:16px; line-height:1; }
  .weather-temp{ font-size:13px; font-weight:700; color:var(--ink); }
  .logo-mark{ background:#FFFFFF; border:1px solid var(--line); border-radius:12px; padding:6px 12px; display:inline-flex; box-shadow:0 2px 8px rgba(27,36,39,0.06); }
  .logo-mark img{ height:24px; width:auto; display:block; }
  .tagline{ font-size:11.5px; color:var(--ink-soft); margin-top:4px; font-weight:500; letter-spacing:0.2px; }


  .sticky-top{ position:sticky; top:0; z-index:20; background:var(--bg); }

  /* ---------- FILTER BUTTON + SHEET ---------- */
  .filter-bar{ display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--line); }
  .filter-btn{ display:flex; align-items:center; gap:8px; background:var(--ink); color:#fff; border:none; border-radius:999px; padding:10px 16px; font-size:12.5px; font-weight:600; cursor:pointer; }
  .filter-btn svg{ width:14px;height:14px; }
  .filter-count{ background:var(--accent); border-radius:999px; min-width:16px; height:16px; padding:0 4px; font-size:9.5px; display:flex; align-items:center; justify-content:center; }
  .result-count{ font-size:11.5px; color:var(--ink-soft); font-weight:500; }

  .sheet-overlay{ position:fixed; inset:0; background:rgba(10,15,17,0.5); display:none; z-index:100; }
  .sheet-overlay.active{ display:block; }
  .sheet{ position:fixed; left:50%; bottom:0; transform:translateX(-50%) translateY(100%); transition:transform .28s ease; width:100%; max-width:430px; background:var(--bg); border-radius:20px 20px 0 0; z-index:101; max-height:80vh; overflow-y:auto; padding:8px 0 22px; box-shadow:0 -10px 30px rgba(0,0,0,0.15); }
  .sheet.active{ transform:translateX(-50%) translateY(0); }
  .sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:99px; margin:8px auto 4px; }
  .sheet-section{ padding:14px 20px; border-bottom:1px solid var(--line); }
  .sheet-section:last-child{ border-bottom:none; }
  .sheet-section-title{ font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:10px; }
  .sheet-reset{ display:flex; align-items:center; justify-content:space-between; padding:14px 20px; cursor:pointer; }
  .sheet-reset span{ font-size:14px; font-weight:700; }
  .sheet-options{ display:flex; flex-wrap:wrap; gap:8px; }
  .sheet-chip{ font-size:12px; font-weight:600; padding:8px 14px; border-radius:8px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); cursor:pointer; }
  .sheet-chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .sheet-apply{ margin:14px 20px 0; display:block; width:calc(100% - 40px); background:var(--accent); color:#fff; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:700; cursor:pointer; }

  .list-caption{ font-size:12px; color:var(--ink-soft); padding:14px 20px 4px; line-height:1.7; }
  .list-caption b{ color:var(--accent-deep); font-weight:600; }

  /* ---------- LIST ---------- */
  .place-list{ padding:8px 16px 28px; }
  .place-row{ display:flex; align-items:center; gap:14px; padding:12px; background:var(--card); border:1px solid var(--line); border-radius:14px; margin-bottom:10px; cursor:pointer; position:relative; transition:transform .12s ease, box-shadow .12s ease; }
  .place-row:active{ transform:scale(0.985); }
  .place-row.owned{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .place-row.magnet-highlight{ border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), 0 8px 20px rgba(217,96,31,0.25); animation:magnetPulse 1.8s ease-in-out 2; }
  @keyframes magnetPulse{ 0%,100%{ box-shadow:0 0 0 2px var(--accent), 0 8px 20px rgba(217,96,31,0.25);} 50%{ box-shadow:0 0 0 4px var(--accent), 0 8px 26px rgba(217,96,31,0.4);} }
  .place-thumb{ width:64px; height:64px; border-radius:11px; flex-shrink:0; background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; border:1px solid var(--line); box-shadow:0 3px 8px rgba(27,36,39,0.08); }
  .place-thumb svg{ width:24px; height:24px; }
  .place-info{ flex:1; min-width:0; }
  .place-name-row{ display:flex; align-items:center; gap:7px; }
  .place-name{ font-size:14px; font-weight:700; color:var(--ink); }
  .owned-badge{ font-size:9px; font-weight:700; color:#fff; background:var(--accent); padding:2px 7px; border-radius:999px; letter-spacing:0.2px; flex-shrink:0; }
  .place-desc{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; line-height:1.5; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .place-dist{ font-size:10px; color:var(--ink-soft); margin-top:5px; font-weight:600; letter-spacing:0.2px; }
  .place-chevron{ flex-shrink:0; color:var(--ink-soft); }
  .place-chevron svg{ width:16px; height:16px; }

  /* ---------- DETAIL VIEW ---------- */
  .detail-hero{ height:210px; position:relative; display:flex; align-items:flex-end; padding:16px; background-size:cover; background-position:center; }
  .detail-hero .backbtn{ position:absolute; top:16px; left:16px; display:flex; align-items:center; gap:7px; background:rgba(255,255,255,0.96); border-radius:999px; padding:8px 14px 8px 11px; border:none; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.18); }
  .detail-hero .backbtn svg{ width:14px;height:14px; }
  .detail-hero .backbtn span{ font-size:12px; font-weight:700; color:var(--ink); letter-spacing:0.2px; }
  .detail-hero .hero-logo{ position:absolute; top:20px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.94); border-radius:10px; padding:5px 10px; box-shadow:0 3px 8px rgba(0,0,0,0.15); }
  .detail-hero .hero-logo img{ height:16px; width:auto; display:block; filter:none; }
  .detail-hero .cat-line{ font-size:12px; color:#fff; opacity:0.92; font-weight:600; letter-spacing:0.2px; margin-top:3px; text-transform:uppercase; }
  .detail-hero .title{ font-family:'Fraunces', serif; font-weight:600; font-size:24px; color:#fff; text-shadow:0 2px 12px rgba(0,0,0,0.4); line-height:1.15; }
  .detail-hero .dist{ font-size:12px; color:#fff; opacity:0.92; margin-top:3px; font-weight:500; }

  .tabbar{ display:flex; padding:0 20px; border-bottom:1px solid var(--line); overflow-x:auto; }
  .tabbtn{ background:none; border:none; font-family:'Inter', sans-serif; font-size:12.5px; font-weight:600; color:var(--ink-soft); padding:15px 0; margin-inline-end:20px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  .tabbtn.active{ color:var(--ink); border-bottom-color:var(--accent); }
  .tabpanel{ display:none; padding:20px; }
  .tabpanel.active{ display:block; animation:fadeUp .28s ease; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }

  .gallery-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px; }
  .gallery-swatch{ flex:0 0 100px; height:120px; border-radius:10px; display:flex; align-items:flex-end; padding:8px; font-size:10.5px; color:#fff; font-weight:600; background-size:cover; background-position:center; cursor:pointer; transition:transform .15s ease; border:1px solid var(--line); box-shadow:0 4px 12px rgba(27,36,39,0.12); }
  .gallery-swatch:active{ transform:scale(0.96); }
  .story-text{ font-size:13.5px; line-height:1.95; color:var(--ink-soft); }

  .tip-row{ display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line); }
  .tip-row:last-child{ border-bottom:none; }
  .tip-row .icon{ width:34px;height:34px;border-radius:9px; background:var(--navy-soft); display:flex;align-items:center;justify-content:center; flex-shrink:0; }
  .tip-row .icon svg{ width:16px;height:16px; }
  .tip-row .name{ font-size:13px; font-weight:600; }
  .tip-row .meta{ font-size:11px; color:var(--ink-soft); margin-top:1px; }
  .tip-row a{ margin-inline-start:auto; font-size:11.5px; color:var(--accent-deep); text-decoration:none; font-weight:600; }

  .maplink{ display:flex; align-items:center; justify-content:center; gap:8px; background:var(--ink); color:#fff; border-radius:10px; padding:14px; text-decoration:none; font-size:13.5px; font-weight:600; margin-bottom:10px; }
  .maplink:last-of-type{ margin-bottom:0; }
  .maplink.secondary-link{ background:var(--card); color:var(--ink); border:1px solid var(--line); }
  .maplink.ticket-link{ background:var(--accent); color:#fff; }
  .maplink svg{ width:16px;height:16px; }
  .mininote{ font-size:11px; color:var(--ink-soft); margin-top:12px; text-align:center; line-height:1.7; }

  .nearby-card{ display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer; transition:transform .12s ease; }
  .nearby-card:active{ transform:scale(0.98); }
  .nearby-card .dot{ width:8px;height:8px;border-radius:50%; flex-shrink:0; }
  .nearby-card .name{ font-size:12.5px; font-weight:600; }
  .nearby-card .band{ font-size:11px; color:var(--ink-soft); margin-top:1px; }
  .nearby-card .go{ margin-inline-start:auto; color:var(--ink-soft); }
  .nearby-card .go svg{ width:14px;height:14px; }
  .stub{ text-align:center; padding:26px 10px; color:var(--ink-soft); font-size:12.5px; line-height:1.8; }

  /* inline carousel — coverflow style, embedded directly on the page and auto-advancing */
  .carousel-wrap{ margin-bottom:20px; }
  .lb-stage{ position:relative; width:100%; height:230px; display:flex; align-items:center; justify-content:center; }
  .lb-slide{ position:absolute; top:0; left:50%; width:100%; height:100%; margin-left:-50%; transition:transform .4s cubic-bezier(.4,0,.2,1), opacity .4s ease; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .lb-slide img{ max-height:210px; max-width:150px; border-radius:12px; box-shadow:0 10px 24px rgba(27,36,39,0.22); display:block; object-fit:cover; }
  .lb-slide.pos-center{ transform:translateX(0) scale(1); opacity:1; z-index:3; pointer-events:auto; }
  .lb-slide.pos-center img{ max-height:230px; max-width:180px; }
  .lb-slide.pos-left{ transform:translateX(-84px) scale(0.72); opacity:0.5; z-index:2; }
  .lb-slide.pos-right{ transform:translateX(84px) scale(0.72); opacity:0.5; z-index:2; }
  .lb-slide.pos-farleft{ transform:translateX(-130px) scale(0.5); opacity:0; z-index:1; }
  .lb-slide.pos-farright{ transform:translateX(130px) scale(0.5); opacity:0; z-index:1; }
  .lightbox-nav{ display:flex; align-items:center; justify-content:center; gap:20px; margin-top:12px; }
  .lightbox-nav button{ width:34px;height:34px;border-radius:50%; background:var(--card); border:1px solid var(--line); color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .lightbox-nav button svg{ width:15px;height:15px; }
  .lb-dots{ display:flex; gap:6px; }
  .lb-dots span{ width:6px; height:6px; border-radius:50%; background:var(--line); }
  .lb-dots span.active{ background:var(--accent); }
  .lb-dots{ display:flex; gap:6px; }
  .lb-dots span{ width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.35); }
  .lb-dots span.active{ background:#fff; }
</style>

function loadWeather(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude=-45.8741&longitude=170.5036&current_weather=true')

    .then(data=>{
      const cw = data.current_weather;

      document.getElementById('weather-icon').textContent = WEATHER_CODE_ICON[cw.weathercode] || '🌡️';
    })
    .catch(()=>{ document.getElementById('weather-temp').textContent = '—'; });
}
loadWeather();

    <text x='200' y='292' font-family='Arial' font-size='13' fill='white' text-anchor='middle' opacity='0.75' letter-spacing='2'>${tag}</text>
  </svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}
function galleryFor(p){
  const extra = EXTRA[p.id];
  if(extra && extra.gallery && extra.gallery.length) return extra.gallery;
  const c = SWATCH[p.cats[0]];
  return [
    placeholderPhoto(p.name, c, 'PHOTO 1 — SAMPLE'),
    placeholderPhoto(p.name, c, 'PHOTO 2 — SAMPLE'),
    placeholderPhoto(p.name, c, 'PHOTO 3 — SAMPLE')
  ];
}
const CAT_COLOR = SWATCH;
const CAT_SOFT = { heritage:'#DEE6EA', wildlife:'#DCEAE5', beaches:'#DCE8EE', geology:'#F1E0D6', museums:'#F0E2C4', gardens:'#E3EADB', city_culture:'#F7E2D2' };
const CAT_LABEL = { heritage:'Architecture & Heritage', wildlife:'Wildlife & Nature Reserves', beaches:'Beaches & Coast', geology:'Geological Wonders', museums:'Museums & Galleries', gardens:'Gardens & Green Spaces', city_culture:'City Culture & Viewpoints' };
const CAT_ICON = {
  heritage:'<svg viewBox="0 0 24 24" fill="none" stroke="#22394A" stroke-width="2"><path d="M4 21h16M5 21V10l7-6 7 6v11M9 21v-5h6v5"/></svg>',
  wildlife:'<svg viewBox="0 0 24 24" fill="none" stroke="#2F6B5E" stroke-width="2"><path d="M4 14c2-6 6-9 8-9s6 3 8 9c-2 2-5 3-8 3s-6-1-8-3z"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/></svg>',
  beaches:'<svg viewBox="0 0 24 24" fill="none" stroke="#2C6E8E" stroke-width="2"><path d="M3 17c2-2 4-2 6 0s4 2 6 0 4-2 6 0M12 3v8M8 7l4 4 4-4"/></svg>',
  geology:'<svg viewBox="0 0 24 24" fill="none" stroke="#A65A3C" stroke-width="2"><path d="M3 20l5-11 4 6 3-4 6 9H3z"/></svg>',
  museums:'<svg viewBox="0 0 24 24" fill="none" stroke="#A97A2E" stroke-width="2"><path d="M3 21h18M5 21V10l7-5 7 5v11M4 10h16"/></svg>',
  gardens:'<svg viewBox="0 0 24 24" fill="none" stroke="#5C7A4A" stroke-width="2"><path d="M12 2c3 2 4 5 4 8a4 4 0 0 1-8 0c0-3 1-6 4-8z"/><path d="M12 14v8"/></svg>',
  city_culture:'<svg viewBox="0 0 24 24" fill="none" stroke="#D9601F" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>'
};
const TIP_ICON = {
  cafe:'<svg viewBox="0 0 24 24" fill="none" stroke="#22394A" stroke-width="2"><path d="M4 8h13v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8z"/><path d="M17 9h1.5a2.5 2.5 0 0 1 0 5H17"/></svg>',
  wc:'<svg viewBox="0 0 24 24" fill="none" stroke="#22394A" stroke-width="2"><circle cx="12" cy="7" r="3"/><path d="M6 21v-6a6 6 0 0 1 12 0v6"/></svg>',
  food:'<svg viewBox="0 0 24 24" fill="none" stroke="#22394A" stroke-width="2"><path d="M6 2v8M10 2v8M8 10v12M17 2c-2 0-3 2-3 5s1 3 3 3v10"/></svg>'
};

let activeCats = [];   // multi-select: [] means "any category"
let activeBand = 'all';

const DIST_LABELS = {all:'Any distance', b1:'Up to 1 km', b2:'1–7 km', b3:'7–17 km', b4:'17+ km'};

function renderList(){
  const wrap = document.getElementById('place-list');
  const filtered = PLACES.filter(p =>
    (activeCats.length===0 || p.cats.some(c=>activeCats.includes(c))) &&
    (activeBand==='all' || p.band===activeBand)
  );
  document.getElementById('result-count').textContent = filtered.length + (filtered.length===1?' place':' places');
  const activeCount = activeCats.length + (activeBand!=='all'?1:0);
  const countEl = document.getElementById('filter-count');
  if(activeCount>0){ countEl.style.display='flex'; countEl.textContent = activeCount; } else { countEl.style.display='none'; }

  if(filtered.length===0){
    wrap.innerHTML = `<div class="stub">No places match these filters. Try widening one of them.</div>`;
    return;
  }
  wrap.innerHTML = filtered.map(p=>{
    const primary = p.cats[0];
    return `<div class="place-row" id="row-${p.id}" onclick="openDetail('${p.id}')">
      <div class="place-thumb" style="background:${CAT_SOFT[primary]}">${CAT_ICON[primary]}</div>
      <div class="place-info">
        <div class="place-name-row">
          <div class="place-name">${p.name}</div>
        </div>
        <div class="place-desc">${p.story}</div>
        <div class="place-dist">${p.distLabel} · ${p.timeLabel}</div>
      </div>
      <div class="place-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></div>
    </div>`;
  }).join('');
}

function buildSheet(){
  document.getElementById('sheet-dist').innerHTML = Object.keys(DIST_LABELS).map(k=>
    `<div class="sheet-chip ${activeBand===k?'active':''}" data-band="${k}">${DIST_LABELS[k]}</div>`).join('');
  document.getElementById('sheet-cat').innerHTML = Object.keys(CAT_LABEL).map(k=>
    `<div class="sheet-chip ${activeCats.includes(k)?'active':''}" data-cat="${k}">${CAT_LABEL[k]}</div>`).join('');
}
buildSheet();
renderList();
handleMagnetLink();

/* Each magnet is programmed with its own link, e.g. yoursite.com/#baldwin.
   Landing here shows the full list first (so people still discover other
   places) but scrolls straight to their magnet's row and highlights it,
   rather than forcing them into that one detail page. */
function handleMagnetLink(){
  const id = location.hash.replace('#','').trim();
  if(!id) return;
  const p = PLACES.find(x=>x.id===id);
  if(!p) return;
  setTimeout(()=>{
    const row = document.getElementById('row-'+id);
    if(!row) return;
    row.scrollIntoView({behavior:'smooth', block:'center'});
    row.classList.add('magnet-highlight');
  }, 350);
}
window.addEventListener('hashchange', handleMagnetLink);

document.getElementById('sheet-dist').addEventListener('click', e=>{
  const chip = e.target.closest('.sheet-chip');
  if(!chip) return;
  activeBand = chip.dataset.band;
  buildSheet(); renderList();
});
document.getElementById('sheet-cat').addEventListener('click', e=>{
  const chip = e.target.closest('.sheet-chip');
  if(!chip) return;
  const k = chip.dataset.cat;
  const i = activeCats.indexOf(k);
  if(i===-1) activeCats.push(k); else activeCats.splice(i,1);
  buildSheet(); renderList();
});
function resetFilters(){
  activeCats=[]; activeBand='all';
  buildSheet(); renderList(); closeSheet();
}
function openSheet(){
  document.getElementById('sheet-overlay').classList.add('active');
  document.getElementById('sheet').classList.add('active');
}
function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('active');
  document.getElementById('sheet').classList.remove('active');
}

let currentGallery = [];
let lightboxIdx = 0;
let autoplayTimer = null;
const AUTOPLAY_MS = 3200;

function openDetail(id, fromPopstate){
  const p = PLACES.find(x=>x.id===id);
  if(!p) return;
  const extra = EXTRA[id] || {tips:[]};

  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  if(!fromPopstate){
    history.pushState({view:'detail', id}, '', '#'+id);
  }

  const hero = document.getElementById('detail-hero');
  hero.style.background = `linear-gradient(160deg, ${SWATCH[p.cat]}dd, ${SWATCH[p.cat]})`;
  document.getElementById('detail-title').textContent = p.name;
  document.getElementById('detail-dist').textContent = p.id==='octagon' ? p.distLabel : `${p.distLabel} · ${p.timeLabel}`;
  document.getElementById('cat-line').textContent = p.owned ? '★ Your magnet' : CAT_LABEL[p.cat];

  startCarousel(galleryFor(p));
  document.getElementById('story-text').textContent = p.story;

  const extraLinks = [];
  if(extra.siteUrl) extraLinks.push(`<a class="maplink secondary-link" href="${extra.siteUrl}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
      Official website
    </a>`);
  if(extra.ticketUrl) extraLinks.push(`<a class="maplink ticket-link" href="${extra.ticketUrl}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10a2 2 0 0 0 0 4v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 0 1 0-4V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3z"/></svg>
      Buy tickets
    </a>`);
  document.getElementById('story-links').innerHTML = extraLinks.length
    ? `<div style="margin-top:16px;">${extraLinks.join('')}</div>` : '';

  document.getElementById('map-panel-body').innerHTML = `
    <a class="maplink" href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lon}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 21s7-6.2 7-11.5A7 7 0 0 0 5 9.5C5 14.8 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.3"/></svg>
      Open in Google Maps
    </a>
    <p class="mininote">Tapping this opens directions to ${p.name} in your phone's map app.</p>`;

  const tipsBody = document.getElementById('tips-body');
  if(!extra.tips || extra.tips.length===0){
    tipsBody.innerHTML = `<div class="stub">No local tips added for this place yet.</div>`;
  } else {
    const orderedTips = [...extra.tips].sort((a,b)=>(a.type==='wc')-(b.type==='wc'));
    tipsBody.innerHTML = orderedTips.map(t=>`
      <div class="tip-row">
        <div class="icon">${TIP_ICON[t.type]}</div>
        <div><div class="name">${t.name}</div><div class="meta">${t.meta}</div></div>
        <a href="https://www.google.com/maps/search/${encodeURIComponent(t.mapQ)}" target="_blank" rel="noopener">Directions</a>
      </div>`).join('');
  }

  const nearbyBody = document.getElementById('nearby-body');
  const withinWalk = p.nearby.filter(n=>n.distKm<=1);
  const introText = withinWalk.length
    ? `Places within 1 km walk of ${p.name}:`
    : `Nothing else is within 1 km, but here's what's closest to ${p.name}:`;
  nearbyBody.innerHTML = `<p class="mininote" style="margin-top:0;margin-bottom:14px;text-align:left;">${introText}</p>` + p.nearby.map(n=>{
    const np = PLACES.find(x=>x.id===n.id);
    if(!np) return '';
    const distText = n.distKm<1 ? `${Math.round(n.distKm*1000)} m away` : `${n.distKm.toFixed(1)} km away`;
    const timeText = n.distKm<=1 ? `~${Math.max(1,Math.round(n.distKm/5*60))} min walk` : `~${Math.max(1,Math.round(n.distKm/35*60))} min drive`;
    return `<div class="nearby-card" onclick="openDetail('${np.id}')">
      <span class="dot" style="background:${np.owned?'#D9601F':CAT_COLOR[np.cat]}"></span>
      <div><div class="name">${np.name}</div><div class="band">${CAT_LABEL[np.cat]} · ${distText} · ${timeText}</div></div>
      <span class="go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span>
    </div>`;
  }).join('');

  switchTab('story');
  window.scrollTo(0,0);
}

/* The carousel is embedded directly on the page (no tap needed to open it)
   and advances on its own; manual arrows still work and just reset the timer. */
function startCarousel(images){
  currentGallery = images;
  lightboxIdx = 0;
  const stage = document.getElementById('lb-stage');
  stage.innerHTML = currentGallery.map(url=>`<div class="lb-slide"><img src="${url}"></div>`).join('');
  const dots = document.getElementById('lb-dots');
  dots.innerHTML = currentGallery.map(()=>`<span></span>`).join('');
  updateLightboxPos();
  if(autoplayTimer) clearInterval(autoplayTimer);
  if(currentGallery.length > 1){
    autoplayTimer = setInterval(()=>navLightbox(1), AUTOPLAY_MS);
  }
}
function navLightbox(d){
  lightboxIdx = (lightboxIdx + d + currentGallery.length) % currentGallery.length;
  updateLightboxPos();
  if(autoplayTimer){ clearInterval(autoplayTimer); autoplayTimer = setInterval(()=>navLightbox(1), AUTOPLAY_MS); }
}
function updateLightboxPos(){
  const slides = document.querySelectorAll('#lb-stage .lb-slide');
  const n = slides.length;
  slides.forEach((el,idx)=>{
    let rel = idx - lightboxIdx;
    if(rel > n/2) rel -= n;
    if(rel < -n/2) rel += n;
    let cls = 'pos-farright';
    if(rel===0) cls='pos-center';
    else if(rel===1) cls='pos-right';
    else if(rel===-1) cls='pos-left';
    else if(rel<0) cls='pos-farleft';
    el.className = 'lb-slide ' + cls;
  });
  document.querySelectorAll('#lb-dots span').forEach((el,idx)=>el.classList.toggle('active', idx===lightboxIdx));
}

function goToList(fromPopstate){
  if(autoplayTimer) clearInterval(autoplayTimer);
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-list').classList.add('active');
  if(!fromPopstate){
    history.pushState({view:'list'}, '', location.pathname + location.search);
  }
}

/* Makes the phone's hardware/gesture back button step back inside the app
   (detail -> list) instead of leaving the site entirely on the first press. */
history.replaceState({view:'list'}, '', location.href);
window.addEventListener('popstate', (e)=>{
  const state = e.state;
  if(!state || state.view === 'list'){
    goToList(true);
  } else if(state.view === 'detail' && state.id){
    openDetail(state.id, true);
  }
});
function switchTab(name){
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  document.querySelectorAll('.tabpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}
</script>
